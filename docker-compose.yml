services:
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    depends_on:
      - redis

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cozytrack
      POSTGRES_PASSWORD: cozytrack
      POSTGRES_DB: cozytrack
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cozytrack-local}
      MINIO_CORS_FILE: /tmp/s3-cors-console.json
    volumes:
      - ./scripts/minio-bucket.sh:/scripts/minio-bucket.sh:ro
      - ./infra/s3-cors-console.json:/tmp/s3-cors-console.json:ro
    entrypoint: ["/bin/sh"]
    command: ["/scripts/minio-bucket.sh", "provision"]

  minio-mc:
    image: quay.io/minio/mc:latest
    profiles:
      - tools
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cozytrack-local}
      MINIO_CORS_FILE: /tmp/s3-cors-console.json
    volumes:
      - ./scripts/minio-bucket.sh:/scripts/minio-bucket.sh:ro
      - ./infra/s3-cors-console.json:/tmp/s3-cors-console.json:ro
    entrypoint: ["/bin/sh"]

volumes:
  pgdata:
  miniodata:
