name: Browser smoke

on:
  pull_request:
    paths:
      - ".github/workflows/browser-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "scripts/test-browser-smoke.sh"
      - "src/app/session/**"
      - "src/app/studio/**"
      - "src/components/**"
      - "src/hooks/**"
      - "src/lib/recorder.ts"
      - "src/lib/transport/**"
      - "tests/browser/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/browser-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "scripts/test-browser-smoke.sh"
      - "src/app/session/**"
      - "src/app/studio/**"
      - "src/components/**"
      - "src/hooks/**"
      - "src/lib/recorder.ts"
      - "src/lib/transport/**"
      - "tests/browser/**"

permissions:
  contents: read

jobs:
  browser-smoke:
    name: Browser recording smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:browser
